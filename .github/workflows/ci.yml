name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows:
    # Version bumps are verified by the tag-triggered Release workflow
    # (full Tauri build). Skip CI there to avoid a duplicate Windows job.
    if: >
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm test
      - name: Build frontend
        run: npm run build
      - name: Rust fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml
